window.uFC=function(){var e=parseInt(document.getElementById('eS').value);var a=parseInt(document.getElementById('aS').value);var c=parseInt(document.getElementById('cS').value);var sv=parseInt(document.getElementById('sS').value);

var gr=me*a;var tc=Math.round(gr*c/100);document.getElementById('gR').textContent=fmt(gr);document.getElementById('gC').textContent=fmt(tc);document.getElementById('gP').textContent=fmt(gr-tc);
var sm=sv===1?[.7,.7,.8,.9,1,1.1,1.2,1.1,1,.9,.8,.7]:sv===2?[.4,.5,.7,.8,1.2,1.5,1.8,1.6,1.4,1,.8,.5]:[.2,.3,.5,.7,1.4,1.8,2.2,2,1.6,1,.6,.3];

// ===== QUOTE =====

document.getElementById('qPv').innerHTML=o;
};
